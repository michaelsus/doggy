    <h1>狗 (Dog)</h1>
    <p>狗（學名：Canis lupus familiaris），亦稱家犬，是一種常見的犬科哺乳動物，也是人類最早馴化的家畜之一。牠們以忠誠、聰穎以及與人類的親密關係而聞名，常被稱為「人類最好的朋友」。</p>
    <p>狗的種類繁多，體型和毛色各異，從微小的吉娃娃到巨大的聖伯納犬，展現了極大的多樣性。</p>
